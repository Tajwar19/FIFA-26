name: Auto Scrape and Update Data

on:
  schedule:
    # Runs every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:
    # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run Scrapers
        run: |
          python scrape_standings.py
          python scrape_bracket.py
          python scrape_bracket_tree.py

      - name: Generate static data.json
        run: |
          python dump_data.py

      - name: Rebuild static index.html
        run: |
          python build_static.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f all_standings.json all_matches.json bracket_tree.json data.json index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update live data (GitHub Actions)" && git push origin main)
